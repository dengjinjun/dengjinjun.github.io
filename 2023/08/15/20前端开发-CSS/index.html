        <h1 id="前端开发-CSS"><a href="#前端开发-CSS" class="headerlink" title="前端开发-CSS"></a>前端开发-CSS</h1><p>CSS，专门用来美化标签</p>
<ul>
<li>基础CSS，写简单页面，能够看懂别人的样式，能够理解并修改</li>
<li>基于模板进行调整和修改</li>
</ul>
<h2 id="快速了解CSS"><a href="#快速了解CSS" class="headerlink" title="快速了解CSS"></a>快速了解CSS</h2><h3 id="CSS应用方式"><a href="#CSS应用方式" class="headerlink" title="CSS应用方式"></a>CSS应用方式</h3><ul>
<li><p>直接在标签上应用</p>
<pre><code class="html">&lt;img src=&quot;...&quot; style=&quot;height:100px&quot;/&gt;
&lt;div style=&quot;color:red;&quot;&gt;&lt;/div&gt;
</code></pre>
</li>
<li><p>在<head>标签中写<style>标签</p>
<pre><code class="html">&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;en&quot;&gt;
&lt;head&gt;
    &lt;meta charset=&quot;UTF-8&quot;&gt;
    &lt;title&gt;用户登录&lt;/title&gt;
    &lt;style&gt;
        .c1&#123;
            color:res;
        &#125;
    &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;h1 class=&quot;c1&quot;&gt;标题&lt;/h1&gt;    
&lt;/body&gt;
&lt;/html&gt;
</code></pre>
</li>
<li><p>链接到文件中</p>
<pre><code class="html">&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;en&quot;&gt;
&lt;head&gt;
    &lt;meta charset=&quot;UTF-8&quot;&gt;
    &lt;title&gt;用户登录&lt;/title&gt;
    &lt;link rel=&quot;stylesheet&quot; href=&quot;xx.css&quot;/&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;h1 class=&quot;c1&quot;&gt;标题&lt;/h1&gt;    
&lt;/body&gt;
&lt;/html&gt;
</code></pre>
</li>
</ul>
<p>用Flask框架开发不方便的地方</p>
<ul>
<li>每次都需要重启</li>
<li>规定有些文件必须要放到特定的文件夹</li>
<li>新创建一个页面<ul>
<li>编写函数</li>
<li>新建HTML文件</li>
</ul>
</li>
</ul>
<h3 id="CSS选择器"><a href="#CSS选择器" class="headerlink" title="CSS选择器"></a>CSS选择器</h3><ul>
<li><p>类选择器</p>
<pre><code class="html">.c1&#123;
    ...
&#125;
</code></pre>
</li>
<li><p>id选择器(不重复)</p>
<pre><code class="html">#c1&#123;
    ...
&#125;
</code></pre>
</li>
<li><p>标签选择器（过于绝对）</p>
<pre><code class="html">div&#123;
    ...
&#125;
li&#123;
    ...
&#125;
</code></pre>
</li>
<li><p>属性选择器</p>
<pre><code class="html">可以与上述三种选择器结合使用，比如
.c1[value=&quot;1&quot;]&#123;
    ...
&#125;
input[type=&quot;text&quot;]&#123;
    ...
&#125;
</code></pre>
</li>
<li><p>后代选择器</p>
<pre><code class="html">类选择器和标签选择器可以搭配使用
.c1 li&#123;
    ...
&#125;
类为c1的标签，其子孙li标签会应用这种样式

.c1&gt;li&#123;
    ...
&#125;
类为c1的标签，只有其子代li标签会应用这种样式
</code></pre>
</li>
</ul>
<h3 id="多个样式和覆盖的问题"><a href="#多个样式和覆盖的问题" class="headerlink" title="多个样式和覆盖的问题"></a>多个样式和覆盖的问题</h3><pre><code class="html">&lt;style&gt;
    .c1&#123;
        ...
    &#125;
    .c2&#123;
        ...
    &#125;
&lt;/style&gt;
&lt;div class=&quot;c1 c2&quot;&gt;cczu&lt;/div&gt;   
&lt;div class=&quot;c2 c1&quot;&gt;cczu&lt;/div&gt; 		
# 无论class属性是先定义哪个类，由于在样式中是c2后定义的，所以c2会覆盖c1
</code></pre>
<pre><code class="html">&lt;style&gt;
    .c1&#123;
        ...	!important		# 这样就不会被覆盖
    &#125;
    .c2&#123;
        ...
    &#125;
&lt;/style&gt;
&lt;div class=&quot;c1 c2&quot;&gt;cczu&lt;/div&gt;   
&lt;div class=&quot;c2 c1&quot;&gt;cczu&lt;/div&gt; 
</code></pre>
<h2 id="基本CSS样式"><a href="#基本CSS样式" class="headerlink" title="基本CSS样式"></a>基本CSS样式</h2><ul>
<li><p>高度和宽度</p>
<pre><code class="html">.c1&#123;
    height:50px;
    width:50px;
&#125;
高度不支持百分比，宽度支持百分比，比如：width：30%
对于块级标签，设置了空间之后，剩余空间默认无法占用
行内标签默认不遵守高宽设置和边距设置，而是遵守内容本身的空间设置
</code></pre>
</li>
<li><p>行内、块级特性</p>
<pre><code class="html">display:inline	# 使块级标签转化为行内标签
display:block	# 使行内标签转化为块级标签
display:inline-block;	# 即具有行内标签的特性，又具有块级标签的特性
</code></pre>
</li>
<li><p>字体设置</p>
<pre><code class="html">color:#00ff00;		# 字体颜色
font-size:30px		# 字体大小
font-weight:600		# 字体加粗
font-family:Microsoft Yahei		# 字体类型（微软雅黑）
</code></pre>
</li>
<li><p>文字对齐方式</p>
<pre><code class="html">text-align:center;		# 水平方向居中
line-height:??px		# ??指行高，需要与整块的行高相同，则文字自动垂直居中
</code></pre>
</li>
<li><p>浮动</p>
<pre><code class="html">默认文本在左边
float:right		# 右边
float属性可以消除块级标签占据整行的特性，也会使标签脱离文档流
解决脱离文档流的问题，需要增加一个标签中设置clear:both
</code></pre>
</li>
<li><p>边距</p>
<pre><code class="html">padding-top:20px	内边距，与自身内部内容之间的距离，right、bottom、left
padding:20px		上下左右的内边距都是20px
padding:20px 10px 5px 5px		上、右、下、左
</code></pre>
<pre><code class="html">margin-top:20px		外边距，与外部内容的距离
margin:0 auto		上边距为0，左右自动（居中）
</code></pre>
</li>
<li><p>透明度</p>
<pre><code class="html">opacity:0.5
透明度从0到1
</code></pre>
<ul>
<li>幕布</li>
</ul>
<pre><code class="html">.mask&#123;
    background-color:black;
    position:fixed;
    left:0;
    right:0;
    top:0;
    bottom:0;
    opacity:0.7;
    z-index:999;	# 用于设置显示层先后的
&#125;
</code></pre>
</li>
<li><p>鼠标放到标签上之后的样式</p>
<pre><code class="html">.c1:hover&#123;		以上的选择器后加上:hover即可
    ...
&#125;
</code></pre>
</li>
<li><p>标签后追加</p>
<pre><code class="html">.c1:after&#123;
    ...
&#125;
</code></pre>
<ul>
<li><p>一个重要的应用，解决float之后无法撑起父级块的问题</p>
<pre><code class="html">&lt;style&gt;
    .clearfix:after&#123;
        content:&quot;&quot;;
        display:block;
        clear:both;    
    &#125;
    .item&#123;
        float:left
    &#125;
&lt;/style&gt;
&lt;body&gt;
    &lt;div class=&quot;clearfix&quot;&gt;
        &lt;div class=&quot;item&quot;&gt;1&lt;/div&gt;
        &lt;div class=&quot;item&quot;&gt;2&lt;/div&gt;
        &lt;div class=&quot;item&quot;&gt;3&lt;/div&gt;
    &lt;/div&gt;
&lt;/body&gt;
</code></pre>
</li>
</ul>
</li>
<li><p>position</p>
<ul>
<li><p>fixed</p>
<pre><code class="html">距离页面顶部和两端的固定位置
.c1&#123;
    position:fixed;
    height:200px;
    width:200px;
    left:50px;
    top:50px;
&#125;
设置为居中
.c1&#123;
    position:fixed;
    height:200px;
    width:200px;
    left:0;
    right:0;
    margin:0 auto;
    top:50px;	
&#125;
</code></pre>
</li>
<li><p>relative和absolute</p>
<pre><code class="html">relative和absolute配合使用，属性为absolute的标签相对于属性为relative的标签改变位置
.c1&#123;
     height:500px;
    width:300px;
    position:relative
 &#125;
.c1 .c2&#123;
    height:59px;
    width:59px;
    position:absolute;
    top:30px;
    right:30px;
&#125;
</code></pre>
</li>
</ul>
</li>
<li><p>边框</p>
<pre><code class="html">border:3px solid red		全部边框：粗细，样式，颜色
border-left:3px solid red	左边框
透明色：transparent
</code></pre>
</li>
<li><p>背景色</p>
<pre><code class="html">background-color:red		
background-color:#00ff00	RGB颜色
</code></pre>
</li>
</ul>
